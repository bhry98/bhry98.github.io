media:
  input: public/images
  output: /images

content:
  - name: blog
    label: Blog Posts
    type: collection
    path: src/content/blog
    filename: "{year}-{month}-{day}-{primary}.md"
    view:
      fields: [title, date]
    fields:
      - { name: title, type: string, required: true }
      - { name: date, type: date }
      - { name: tags, type: string, list: true }
      - { name: body, type: rich-text }

  - name: packages
    label: Packages
    type: collection
    path: src/content/packages
    filename: "{primary}.md"
    fields:
      - { name: title, type: string }
      - { name: version, type: string }
      - { name: body, type: rich-text }

  - name: docs
    label: Documentation
    type: collection
    path: src/content/docs
    filename: "{primary}.md"
    fields:
      - { name: title, type: string }
      - { name: category, type: string }
      - { name: body, type: rich-text }

  - name: portfolio
    label: Portfolio
    type: collection
    path: src/content/projects
    filename: "{primary}.md"
    fields:
      - { name: title, type: string }
      - { name: github, type: string }
      - { name: demo, type: string }
      - { name: description, type: rich-text }